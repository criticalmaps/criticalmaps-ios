# Pre-commit configuration for Critical Maps iOS
# See https://pre-commit.com for more information
#
# Versions pinned here are the single source of truth for swiftformat / swiftlint
# both locally and in CI. pre-commit builds each tool from source via SwiftPM
# and caches the result in ~/.cache/pre-commit, so subsequent runs are fast.

repos:
  - repo: https://github.com/nicklockwood/SwiftFormat
    rev: "0.61.1"
    hooks:
      - id: swiftformat

  - repo: https://github.com/realm/SwiftLint
    rev: "0.62.2"
    hooks:
      - id: swiftlint
        alias: swiftlint-fix
        args: [--fix, --quiet]
      - id: swiftlint
        args: [--quiet]
